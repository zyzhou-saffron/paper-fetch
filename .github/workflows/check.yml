name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.10", "3.12"]
        include:
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show version
        run: python scripts/fetch.py --version

      - name: Smoke — schema subcommand parses as JSON
        run: |
          python scripts/fetch.py schema | python -c "import json,sys; d=json.load(sys.stdin); assert d['ok'] is True, d; assert 'cli_version' in d['data']; print('schema ok, cli', d['data']['cli_version'])"

      - name: Smoke — help exits 0
        run: python scripts/fetch.py --help > /dev/null

      - name: Smoke — validation error exits 3 with structured envelope
        shell: bash
        run: |
          set +e
          out=$(python scripts/fetch.py --format json)
          rc=$?
          set -e
          if [ "$rc" != "3" ]; then
            echo "expected exit 3 for missing args, got $rc"
            echo "stdout: $out"
            exit 1
          fi
          echo "$out" | python -c "import json,sys; e=json.loads(sys.stdin.read()); assert e['ok'] is False; assert e['error']['code'] == 'validation_error'; print('validation envelope ok')"

      - name: Run unit + integration tests
        env:
          PAPER_FETCH_NO_AUTO_UPDATE: "1"
        run: python tests/test_fetch.py -v
