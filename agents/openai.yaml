# OpenAI Codex sidecar configuration for paper-fetch
name: paper-fetch
version: 0.5.0
description: Download paper PDFs by DOI via legal open-access sources (Unpaywall, Semantic Scholar, arXiv, PMC, bioRxiv/medRxiv).
entry: SKILL.md

ui:
  icon: 📄
  category: research

requires:
  bins: [python3]
  # UNPAYWALL_EMAIL is optional — if not set, Unpaywall is skipped
  # and the remaining 4 sources still work.

policy:
  network: true
  filesystem: write
  # Never attempts paywall bypass — only legal OA sources.
  refuses:
    - sci-hub
    - libgen
